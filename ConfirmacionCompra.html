<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Compra Exitosa</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/ConfirmacionCompra.css">
</head>
<body>
    <!-- Encabezado de la página -->
    <header>
        <div class="Logo">
            <span class="material-symbols-outlined IconoLogo">movie</span>
            <h1>CINE CINEMA</h1>
        </div>
        <a href="homepage.html" class="BotonCerrar material-symbols-outlined" style="text-decoration: none;">close</a>
    </header>

    <main>
        <!-- Modal y boleto de confirmación de compra exitosa -->
        <div class="OverlayExito">
            <div class="ModalExito">
                <a href="homepage.html" class="BotonCerrarModal material-symbols-outlined" style="text-decoration: none;">close</a>
                
                <div class="IconoCheckExito">
                    <span class="material-symbols-outlined">check</span>
                </div>

                <h2 class="TituloExito">¡Gracias por tu compra, Julian!</h2>

                <!-- Boleto virtual / Ticket digital -->
                <div class="BoletoDigital">
                    <div class="EncabezadoBoleto">
                        <h3>Interstellar II</h3>
                        <p>Hoy, 22:30 PM | Sala 04</p>
                        <p>Asientos: H12, H13</p>
                    </div>
                    
                    <div class="CodigoBarras">
                        <div class="Barras"></div>
                        <span class="NumeroBoleto">CC - 4920 - X921</span>
                    </div>
                </div>

                <a href="homepage.html" class="BotonEntendido" style="text-decoration: none; display: flex; align-items: center; justify-content: center;">ENTENDIDO</a>
            </div>
        </div>
    </main>

    <!-- Barra de navegación -->
    <nav class="Navegacion">
        <a href="homepage.html" class="EnlaceNav">
            <span class="material-symbols-outlined">movie_filter</span>
            <span>Cartelera</span>
        </a>
        <a href="SeleccionAsientos.html" class="EnlaceNav Activo">
            <span class="material-symbols-outlined">shopping_cart</span>
            <span>Compra</span>
        </a>
        <a href="#" class="EnlaceNav">
            <span class="material-symbols-outlined">person</span>
            <span>Perfil</span>
        </a>
    </nav>

    <!-- Scripts de carga -->
    <script src="JavaScript/peliculas.js"></script>
    <script src="JavaScript/ConfirmacionCompra.js"></script>
</body>
</html>
