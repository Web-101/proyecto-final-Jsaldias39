<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Compra Exitosa</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/estilos.css">
</head>
<body>
    <header>
        <div class="Logo">
            <span class="material-symbols-outlined IconoLogo">movie</span>
            <h1>CINE CINEMA</h1>
        </div>
        <button class="BotonCerrar material-symbols-outlined">close</button>
    </header>

    <main>
        <div class="OverlayExito">
            <div class="ModalExito">
                <button class="BotonCerrarModal material-symbols-outlined">close</button>
                
                <div class="IconoCheckExito">
                    <span class="material-symbols-outlined">check</span>
                </div>

                <h2 class="TituloExito">¡Gracias por tu compra, Julian!</h2>

                <div class="BoletoDigital">
                    <div class="EncabezadoBoleto">
                        <h3>Interstellar II</h3>
                        <p>Hoy, 22:30 PM | Sala 04</p>
                        <p>Asientos: H12, H13</p>
                    </div>
                    
                    <div class="CodigoBarras">
                        <div class="Barras"></div>
                        <span class="NumeroBoleto">CC - 4920 - X921</span>
                    </div>
                </div>

                <button class="BotonEntendido">ENTENDIDO</button>
            </div>
        </div>
    </main>

    <nav class="Navegacion">
        <a href="#" class="EnlaceNav">
            <span class="material-symbols-outlined">movie_filter</span>
            <span>Cartelera</span>
        </a>
        <a href="#" class="EnlaceNav Activo">
            <span class="material-symbols-outlined">shopping_cart</span>
            <span>Compra</span>
        </a>
        <a href="#" class="EnlaceNav">
            <span class="material-symbols-outlined">person</span>
            <span>Perfil</span>
        </a>
    </nav>
</body>
</html>
