<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Homepage</title>
        <link rel="stylesheet" href="css/style.css">
    </head>

    <body>
        <header>

            <div class="logo">
                 <img src="icono.png" alt="Icono">
                 <h1>CINE CINEMA</h1>
            </div>
            <nav class="navegacion">
                 <a href="#" class="nav-item"> Cartelera</a>
                 <a href="#" class="nav-item"> Buscar</a>
                <a href="#" class="nav-item"> Perfil</a>    
            </nav>

            <div class="notifications">
                <btn class="btn-notificacion">campana</btn>
            </div>
        </header>




        <main>
            <section class="Cartelera_Categoria">
                <h2>En Cartelera</h2>
                <div class="filters">
                    <button class="filter-btn active">Todos</button>
                    <button class="filter-btn">Acción</button>
                    <button class="filter-btn">Drama</button>
                    <button class="filter-btn">Ciencia Ficción</button>
                </div>
            </section>
            <section class="movies-grid">
                
                <article class="movie-card">
                    <div class="card-image-wrapper">
                        <span class="badge badge-estreno">ESTRENO</span>
                        <img src="ruta-imagen-1.jpg" alt="Odisea Carmesí">
                    </div>
                    <div class="card-info">
                        <h3>Odisea Carmesí</h3>
                        <p>Acción &bull; 142 min</p>
                    </div>
                </article>

                <article class="movie-card">
                    <div class="card-image-wrapper">
                        <span class="badge badge-imax">IMAX</span>
                        <img src="ruta-imagen-2.jpg" alt="Luces de Neón">
                    </div>
                    <div class="card-info">
                        <h3>Luces de Neón</h3>
                        <p>Noir &bull; 118 min</p>
                    </div>
                </article>

                <article class="movie-card">
                    <div class="card-image-wrapper">
                        <span class="badge badge-estreno">ESTRENO</span>
                        <img src="ruta-imagen-3.jpg" alt="Estación Orbital">
                    </div>
                    <div class="card-info">
                        <h3>Estación Orbital</h3>
                        <p>Sci-Fi &bull; 135 min</p>
                    </div>
                </article>

                <article class="movie-card">
                    <div class="card-image-wrapper">
                        <img src="ruta-imagen-4.jpg" alt="El Último Rey">
                    </div>
                    <div class="card-info">
                        <h3>El Último Rey</h3>
                        <p>Drama &bull; 156 min</p>
                    </div>
                </article>

            </section>
        </main>

        <footer> 
            
        </footer>
    </body>
</html>
